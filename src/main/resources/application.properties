# General
spring.application.name=classroom-booking-service-2
server.port=9000
server.servlet.context-path=/classroom-booking
logging.level.dev.jcasaslopez=DEBUG

# Environment variable (topics are shared among different micro-services)
# kafka.topic.name.notifications=${KAFKA_TOPIC_NOTIFICATIONS}
kafka.topic.name.notifications=notifications
# kafka.topic.name.classrooms=${KAFKA_TOPIC_CLASSROOMS}
kafka.topic.name.classrooms=classrooms
# jwt.secretKey=${JWT_SECRETKEY}
jwt.secretKey=MTIzNDU2Nzg5MEFCQ0RFRkdISUpLTE1OT1BRUlNUVVZXWFlaMDEyMzQ1Njc4OTA=

# Database-ralated
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.url=jdbc:mysql://localhost:3306/classroom_bookings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Vindel39!
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Micro-service settings
opening-times.monday=9:00-22:00
opening-times.tuesday=9:00-22:00
opening-times.wednesday=9:00-22:00
opening-times.thursday=9:00-22:00
opening-times.friday=9:00-22:00
opening-times.saturday=CLOSED
opening-times.sunday=CLOSED
time-slot.duration=30
booking.maximum-duration=120
booking.maximum-number-per-week=3

# Kafka-related
spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.listener.observation-enabled=true
spring.kafka.consumer.properties.spring.json.value.default.type=dev.jcasaslopez.classroom.shared.event.ClassroomEvent
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=classroom-booking-service
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer