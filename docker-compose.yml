version: '3.8'

services:
  mysql:
    image: mysql:8.3.0
    container_name: mysql-db
    environment:
      MYSQL_DATABASE: classroom_bookings
      MYSQL_ROOT_PASSWORD: Vindel39!
    ports:
      - "3307:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pVindel39!"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka-seed:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-seed
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./seed-data/classrooms.jsonl:/data/classrooms.jsonl
    entrypoint: >
      bash -c "echo 'Waiting for the broker to accept connections from the producer...' && sleep 3 && kafka-console-producer --bootstrap-server kafka:9092 --topic classrooms --property parse.key=true --property key.separator=: < /data/classrooms.jsonl"
    restart: "no"

  classroom-booking-service:
    build: .
    container_name: classroom-booking-service
    ports:
      - "9000:9000"
    depends_on:
      mysql:
        condition: service_healthy
      kafka-seed:
        condition: service_completed_successfully
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/classroom_bookings?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    entrypoint: ["sh", "-c", "echo 'Esperando a MySQL...' && sleep 5 && java -jar app.jar"]